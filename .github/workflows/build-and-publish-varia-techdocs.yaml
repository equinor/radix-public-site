name: Build TechDocs

on:
  push:
    branches:
      - main
      - docs/backstage-add-mkdocs
      - varia-makefile
  workflow_dispatch:

permissions: {}
jobs:
  techdocs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install techdocs-cli
        run: npm install -g @techdocs/cli

      - name: Generate docs site
        run: uv run techdocs-cli generate --no-docker

      - name: "Az login"
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: 1fee4604-0e5f-4b2a-9481-e466bbec1cea
          tenant-id: 3aa4a235-b6e2-48d5-9195-7fcf05b459b0
          allow-no-subscriptions: true

      - name: Publish to blob storage
        env:
          STORAGE_ACCOUNT_NAME: variatdstprod
          BACKSTAGE_ENTITY_KIND: system
          BACKSTAGE_ENTITY_NAME: radix
        run: |
          az storage blob upload-batch \
            --account-name ${STORAGE_ACCOUNT_NAME} \
            --auth-mode login \
            --source site \
            --destination techdocs/default/${BACKSTAGE_ENTITY_KIND}/${BACKSTAGE_ENTITY_NAME} \
            --overwrite true
